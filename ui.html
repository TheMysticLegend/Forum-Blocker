<html>
  <head>
    <style>

        width: 220px;
        padding: 14px;

        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .label {
        font-size: 14px;
        font-weight: 600;
      }

      .subtext {

        line-height: 1.4;
      }

  <body>
    <div class="row">
      <div>
        <div class="label">Hide forums</div>
      </div>
      <label>
        <input type="checkbox" id="toggle" />

    <div class="subtext">Turns Reddit and Quora results on Google Search on or off.</div>
    <script src="popup.js"></script>
